  &lt;style&gt;
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: &#x27;Inter&#x27;, sans-serif; line-height: 1.6; color: #1e293b; background: #fff; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .gradient-text { background: linear-gradient(135deg, #06b6d4, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .btn-primary { display: inline-block; padding: 18px 40px; background: #06b6d4; color: white; text-decoration: none; border-radius: 12px; font-weight: 700; font-size: 17px; transition: all 0.3s; border: none; cursor: pointer; }

    .btn-secondary { display: inline-block; padding: 18px 40px; background: transparent; color: #0f172a; text-decoration: none; border-radius: 12px; font-weight: 600; font-size: 17px; border: 2px solid #cbd5e1; transition: all 0.3s; }

    /* Navbar */
    .navbar { position: fixed; top: 0; left: 0; right: 0; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.06); }
    .navbar .container { display: flex; align-items: center; justify-content: space-between; height: 72px; }
    .logo { font-size: 24px; font-weight: 900; color: #0f172a; letter-spacing: -0.5px; }

    .nav-links a { text-decoration: none; color: #64748b; font-weight: 500; transition: color 0.2s; font-size: 15px; }
    .nav-links a:hover { color: #0f172a; }
    .nav-cta { padding: 10px 24px !important; font-size: 14px !important; }

    /* Hero */
    .hero { padding: 160px 0 100px; text-align: center; background: linear-gradient(180deg, #f0f9ff 0%, #fff 100%); position: relative; overflow: hidden; }
    .hero::before { content: &#x27;&#x27;; position: absolute; top: -40%; right: -20%; width: 600px; height: 600px; background: radial-gradient(circle, #06b6d412 0%, transparent 70%); border-radius: 50%; }
    .hero::after { content: &#x27;&#x27;; position: absolute; bottom: -20%; left: -10%; width: 400px; height: 400px; background: radial-gradient(circle, #06b6d408 0%, transparent 70%); border-radius: 50%; }
    .hero-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 20px; background: linear-gradient(135deg, #06b6d415, #22d3ee15); color: #0891b2; border-radius: 100px; font-size: 14px; font-weight: 600; margin-bottom: 32px; border: 1px solid #06b6d420; }
    .hero h1 { font-size: 68px; font-weight: 900; line-height: 1.05; margin-bottom: 28px; max-width: 860px; margin-left: auto; margin-right: auto; color: #0f172a; letter-spacing: -2px; }
    .hero p { font-size: 21px; color: #64748b; max-width: 600px; margin: 0 auto 44px; line-height: 1.7; }
    .hero-buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; position: relative; z-index: 1; }
    .hero-social-proof { margin-top: 48px; font-size: 14px; color: #94a3b8; position: relative; z-index: 1; }
    .hero-social-proof strong { color: #475569; }
    .hero-social-proof .avatars { display: inline-flex; margin: 0 6px; vertical-align: middle; }

    .hero-social-proof .avatar:first-child { margin-left: 0; }

    /* Problem/Solution */
    .problem-solution { padding: 100px 0; background: #0f172a; color: white; position: relative; overflow: hidden; }
    .problem-solution::before { content: &#x27;&#x27;; position: absolute; top: 0; right: 0; width: 50%; height: 100%; background: linear-gradient(135deg, transparent 0%, #06b6d415 100%); }
    .ps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; position: relative; z-index: 1; }
    .ps-label { display: inline-block; padding: 6px 16px; border-radius: 6px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }
    .ps-label.problem { background: #ef444430; color: #fca5a5; }
    .ps-label.solution { background: #06b6d425; color: #06b6d4; }
    .ps-content h2 { font-size: 32px; font-weight: 800; margin-bottom: 20px; line-height: 1.3; }
    .ps-content p { font-size: 18px; line-height: 1.8; opacity: 0.85; }
    .ps-divider { width: 2px; background: linear-gradient(180deg, transparent, #06b6d440, transparent); position: absolute; left: 50%; top: 10%; height: 80%; }

    /* Features */
    .features { padding: 100px 0; background: #f8fafc; }
    .section-header { text-align: center; margin-bottom: 64px; }
    .section-header .section-label { display: inline-block; padding: 6px 16px; background: #06b6d410; color: #0891b2; border-radius: 6px; font-size: 13px; font-weight: 600; margin-bottom: 16px; }
    .section-header h2 { font-size: 42px; font-weight: 800; color: #0f172a; margin-bottom: 16px; letter-spacing: -1px; }

    .features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }
    .feature-card { padding: 44px 36px; border-radius: 20px; background: white; border: 1px solid #e2e8f0; transition: all 0.3s; position: relative; }

    .feature-icon { width: 56px; height: 56px; border-radius: 14px; background: linear-gradient(135deg, #06b6d4, #22d3ee); display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
    .feature-icon svg { width: 28px; height: 28px; color: white; }
    .feature-card h3 { font-size: 20px; font-weight: 700; margin-bottom: 12px; color: #0f172a; }
    .feature-card p { color: #64748b; line-height: 1.7; font-size: 15px; }

    /* Early Adopter Pricing */
    .early-adopter { padding: 100px 0; text-align: center; background: #fff; }
    .early-card { max-width: 560px; margin: 0 auto; padding: 56px 48px; border-radius: 24px; background: linear-gradient(135deg, #0f172a, #1e293b); color: white; position: relative; overflow: hidden; }
    .early-card::before { content: &#x27;&#x27;; position: absolute; top: -50%; right: -50%; width: 100%; height: 100%; background: radial-gradient(circle, #06b6d420 0%, transparent 70%); }
    .early-card &gt; * { position: relative; z-index: 1; }
    .early-label { display: inline-block; padding: 8px 20px; background: #06b6d425; color: #06b6d4; border-radius: 100px; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 28px; }

    .early-features { list-style: none; text-align: left; margin: 32px 0; }

    .urgency-text { font-size: 14px; color: #06b6d4; margin-top: 16px; font-weight: 600; }

    .early-card .btn-primary { margin-top: 20px; width: 100%; text-align: center; padding: 20px; font-size: 18px; }

    /* Final CTA */
    .cta { padding: 100px 0; text-align: center; background: linear-gradient(180deg, #f0f9ff 0%, #fff 100%); }
    .cta h2 { font-size: 44px; font-weight: 800; color: #0f172a; margin-bottom: 16px; letter-spacing: -1px; }

    /* Footer */
    .footer { padding: 48px 0; text-align: center; color: #94a3b8; font-size: 14px; border-top: 1px solid #e2e8f0; }
    .footer-links { display: flex; justify-content: center; gap: 24px; margin-bottom: 16px; }

    @media (max-width: 768px) {

ckground: rgba(255,255,255,0.92); backdrop-filter: blur(12px); z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.06); }\n    .navbar .container { display: flex; align-items: center; justify-content: space-between; height: 72px; }\n    .logo { font-size: 24px; font-weight: 900; color: #0f172a; letter-spacing: -0.5px; }\n    .logo span { color: #06b6d4; }\n    .nav-links { display: flex; gap: 32px; list-style: none; align-items: center; }\n    .nav-links a { text-decoration: none; color: #64748b; font-weight: 500; transition: color 0.2s; font-size: 15px; }\n    .nav-links a:hover { color: #0f172a; }\n    .nav-cta { padding: 10px 24px !important; font-size: 14px !important; }\n\n    /* Hero */\n    .hero { padding: 160px 0 100px; text-align: center; background: linear-gradient(180deg, #f0f9ff 0%, #fff 100%); position: relative; overflow: hidden; }\n    .hero::before { content: ''; position: absolute; top: -40%; right: -20%; width: 600px; height: 600px; background: radial-gradient(circle, #06b6d412 0%, transparent 70%); border-radius: 50%; }\n    .hero::after { content: ''; position: absolute; bottom: -20%; left: -10%; width: 400px; height: 400px; background: radial-gradient(circle, #06b6d408 0%, transparent 70%); border-radius: 50%; }\n    .hero-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 20px; background: linear-gradient(135deg, #06b6d415, #22d3ee15); color: #0891b2; border-radius: 100px; font-size: 14px; font-weight: 600; margin-bottom: 32px; border: 1px solid #06b6d420; }\n    .hero h1 { font-size: 68px; font-weight: 900; line-height: 1.05; margin-bottom: 28px; max-width: 860px; margin-left: auto; margin-right: auto; color: #0f172a; letter-spacing: -2px; }\n    .hero p { font-size: 21px; color: #64748b; max-width: 600px; margin: 0 auto 44px; line-height: 1.7; }\n    .hero-buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; position: relative; z-index: 1; }\n    .hero-social-proof { margin-top: 48px; font-siz : 900; margin: 20px 0 8px; letter-spacing: -2px; }\n    .early-card .price-note { font-size: 15px; opacity: 0.7; margin-bottom: 8px; }\n    .early-card .original-price { font-size: 18px; text-decoration: line-through; opacity: 0.5; margin-bottom: 24px; }\n    .early-features { list-style: none; text-align: left; margin: 32px 0; }\n    .early-features li { padding: 10px 0; display: flex; align-items: center; gap: 12px; font-size: 15px; opacity: 0.9; }\n    .early-features li::before { content: '✓'; color: #06b6d4; font-weight: 800; font-size: 16px; flex-shrink: 0; }\n    .urgency-text { font-size: 14px; color: #06b6d4; margin-top: 16px; font-weight: 600; }\n    .spots-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.15); border-radius: 100px; margin-top: 12px; overflow: hidden; }\n    .spots-fill { width: 72%; height: 100%; background: linear-gradient(90deg, #06b6d4, #22d3ee); border-radius: 100px; }\n    .early-card .btn-primary { margin-top: 20px; width: 100%; text-align: center; padding: 20px; font-size: 18px; }\n\n    /* Final CTA */\n    .cta { padding: 100px 0; text-align: center; background: linear-gradient(180deg, #f0f9ff 0%, #fff 100%); }\n    .cta h2 { font-size: 44px; font-weight: 800; color: #0f172a; margin-bottom: 16px; letter-spacing: -1px; }\n    .cta p { font-size: 20px; color: #64748b; max-width: 540px; margin: 0 auto 40px; line-height: 1.7; }\n    .cta-sub { font-size: 14px; color: #94a3b8; margin-top: 16px; }\n\n    /* Footer */\n    .footer { padding: 48px 0; text-align: center; color: #94a3b8; font-size: 14px; border-top: 1px solid #e2e8f0; }\n    .footer-links { display: flex; justify-content: center; gap: 24px; margin-bottom: 16px; }\n    .footer-links a { color: #64748b; text-decoration: none; font-size: 14px; transition: color 0.2s; }\n    .footer-links a:hover { color: #06b6d4; }\n\n    @media (max-width: 768px) {\n      .hero h1 { font-size: 38px; letter-spacing: -1px; }\n      .hero { padding: 120px 0 60px; }\n      .hero p {
