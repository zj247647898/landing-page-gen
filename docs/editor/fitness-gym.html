*{margin:0;padding:0;box-sizing:border-box}
body{font-family:&#x27;Inter&#x27;,sans-serif;line-height:1.6;color:#1f2937;overflow-x:hidden}
.container{max-width:1200px;margin:0 auto;padding:0 24px}

/* Nav */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);border-bottom:1px solid #e5e7eb;padding:16px 0}
.nav .container{display:flex;align-items:center;justify-content:space-between}
.nav-brand{font-size:20px;font-weight:800;color:#16a34a}
.nav-brand span{color:#eab308}
.nav-links{display:flex;gap:32px;align-items:center}
.nav-links a{color:#4b5563;text-decoration:none;font-weight:500;font-size:14px;transition:color .2s}
.nav-links a:hover{color:#16a34a}
.nav-cta{padding:10px 24px;background:#16a34a;color:#fff!important;border-radius:8px;font-weight:600}
.nav-cta:hover{background:#16a34add!important}

/* Hero */
.hero{padding:140px 0 100px;background:linear-gradient(135deg,#16a34a12 0%,#fff 50%,#eab30810 100%);position:relative;overflow:hidden}
.hero::before{content:&#x27;&#x27;;position:absolute;top:-200px;right:-200px;width:500px;height:500px;background:radial-gradient(circle,#16a34a15,transparent 70%);border-radius:50%}
.hero::after{content:&#x27;&#x27;;position:absolute;bottom:-150px;left:-150px;width:400px;height:400px;background:radial-gradient(circle,#eab30815,transparent 70%);border-radius:50%}
.hero .container{position:relative;z-index:1;text-align:center}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;background:linear-gradient(135deg,#16a34a,#eab308);color:#fff;border-radius:100px;font-size:15px;font-weight:700;margin-bottom:28px;animation:pulse-badge 2s infinite}
@keyframes pulse-badge{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.hero h1{font-size:64px;font-weight:900;line-height:1.05;margin-bottom:20px;letter-spacing:-2px;background:linear-gradient(135deg,#111827,#16a34a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:20px;color:#6b7280;max-width:640px;margin:0 auto 36px;line-height:1.7}
.hero-cta{display:flex;gap:16px;justify-content:center;align-items:center;flex-wrap:wrap}
.btn-primary{display:inline-block;padding:18px 44px;background:linear-gradient(135deg,#16a34a,#16a34acc);color:#fff;text-decoration:none;border-radius:12px;font-weight:700;font-size:16px;transition:all .3s;box-shadow:0 4px 24px #16a34a40}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 12px 40px #16a34a50}
.btn-secondary{display:inline-block;padding:18px 44px;background:#fff;color:#16a34a;text-decoration:none;border-radius:12px;font-weight:700;font-size:16px;border:2px solid #16a34a;transition:all .3s}
.btn-secondary:hover{background:#16a34a10;transform:translateY(-3px)}
.hero-stats{display:flex;gap:48px;justify-content:center;margin-top:56px}
.hero-stat{text-align:center}
.hero-stat .number{font-size:36px;font-weight:900;color:#16a34a}
.hero-stat .label{color:#9ca3af;font-size:13px;font-weight:500;text-transform:uppercase;letter-spacing:1px}

/* Classes */
.classes{padding:100px 0;background:#f9fafb}
.section-header{text-align:center;margin-bottom:60px}
.section-header .emoji{font-size:40px;margin-bottom:12px}
.section-header h2{font-size:40px;font-weight:800;margin-bottom:12px;letter-spacing:-1px}
.section-header p{color:#6b7280;font-size:18px}
.classes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px}
.class-card{background:#fff;border-radius:20px;padding:40px 32px;text-align:center;transition:all .3s;border:1px solid #e5e7eb}
.class-card:hover{transform:translateY(-6px);box-shadow:0 20px 60px rgba(0,0,0,0.08);border-color:#16a34a40}
.class-icon{width:72px;height:72px;background:linear-gradient(135deg,#16a34a15,#eab30815);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:32px}
.class-card h3{font-size:22px;font-weight:700;margin-bottom:8px}
.class-card .time{color:#16a34a;font-weight:600;font-size:14px;margin-bottom:12px}
.class-card .desc{color:#6b7280;font-size:14px;line-height:1.6}

/* Trainers */
.trainers{padding:100px 0}
.trainers-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:32px;max-width:800px;margin:0 auto}
.trainer-card{background:#fff;border-radius:24px;padding:40px;display:flex;align-items:center;gap:24px;border:1px solid #e5e7eb;transition:all .3s}
.trainer-card:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,0.06);border-color:#16a34a30}
.trainer-avatar{width:80px;height:80px;background:linear-gradient(135deg,#16a34a,#eab308);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0}
.trainer-info h3{font-size:20px;font-weight:700;margin-bottom:4px}
.trainer-info .specialty{color:#16a34a;font-weight:600;font-size:14px}
.trainer-info .bio{color:#6b7280;font-size:14px;margin-top:8px;line-height:1.5}

/* Pricing */
.pricing{padding:100px 0;background:linear-gradient(135deg,#16a34a08,#eab30808)}
.pricing-card{max-width:520px;margin:0 auto;background:#fff;border-radius:28px;padding:56px 48px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,0.06);border:2px solid #16a34a30;position:relative;overflow:hidden}
.pricing-card::before{content:&#x27;MOST POPULAR&#x27;;position:absolute;top:20px;right:-32px;background:linear-gradient(135deg,#16a34a,#eab308);color:#fff;font-size:11px;font-weight:700;padding:6px 40px;transform:rotate(45deg);letter-spacing:1px}
.pricing-card .badge{display:inline-block;padding:6px 16px;background:#eab30820;color:#eab308;border-radius:100px;font-size:13px;font-weight:700;margin-bottom:20px}
.pricing-card .price{font-size:72px;font-weight:900;color:#16a34a;line-height:1}
.pricing-card .price span{font-size:24px;font-weight:600;color:#9ca3af}
.pricing-card .price-period{color:#9ca3af;font-size:16px;margin:8px 0 32px}
.pricing-features{list-style:none;text-align:left;margin-bottom:36px}
.pricing-features li{padding:12px 0;border-bottom:1px solid #f3f4f6;font-size:15px;display:flex;align-items:center;gap:12px}
.pricing-features li::before{content:&#x27;✅&#x27;;font-size:16px;flex-shrink:0}
.pricing-urgency{margin-top:16px;color:#ef4444;font-weight:600;font-size:14px;animation:urgency-blink 1.5s infinite}

/* CTA */
.cta-section{padding:100px 0;background:linear-gradient(135deg,#16a34a,#16a34add);text-align:center;position:relative;overflow:hidden}
.cta-section::before{content:&#x27;&#x27;;position:absolute;top:-100px;right:-100px;width:300px;height:300px;background:radial-gradient(circle,#eab30830,transparent 70%);border-radius:50%}
.cta-section .container{position:relative;z-index:1}
.cta-section h2{font-size:44px;font-weight:900;color:#fff;margin-bottom:16px;letter-spacing:-1px}
.cta-section p{color:rgba(255,255,255,0.85);font-size:20px;margin-bottom:36px;max-width:560px;margin-left:auto;margin-right:auto}
.btn-white{display:inline-block;padding:20px 52px;background:#fff;color:#16a34a;text-decoration:none;border-radius:12px;font-weight:800;font-size:17px;transition:all .3s;box-shadow:0 4px 24px rgba(0,0,0,0.15)}
.btn-white:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.2)}
.cta-countdown{margin-top:24px;color:rgba(255,255,255,0.7);font-size:14px;font-weight:500}

/* Footer */
.footer{padding:40px 0;text-align:center;background:#111827;color:#9ca3af;font-size:14px}
.footer a{color:#16a34a;text-decoration:none}

/* Responsive */
@media(max-width:768px){
.nav-links{display:none}
.hero h1{font-size:36px}
.hero p{font-size:16px}
.hero-stats{flex-direction:column;gap:20px}
.classes-grid{grid-template-columns:1fr}
.trainers-grid{grid-template-columns:1fr}
.pricing-card{padding:40px 28px}
.pricing-card .price{font-size:56px}
.cta-section h2{font-size:30px}
.hero-cta{flex-direction:column}
.btn-primary,.btn-secondary{width:100%;text-align:center}
}
