.gallery-caption{position:absolute;bottom:0;left:0;right:0;padding:20px;background:linear-gradient(transparent,rgba(0,0,0,.7));font-size:14px;font-weight:500;opacity:0;transition:opacity .3s}
.gallery-item:hover .gallery-caption{opacity:1}

/* Reservation CTA */
.reservation{padding:100px 0;background:linear-gradient(135deg,#b45309,#dc2626);color:#fff;text-align:center;position:relative;overflow:hidden}
.reservation::before{content:&#x27;&#x27;;position:absolute;top:-50%;right:-20%;width:400px;height:400px;border-radius:50%;background:rgba(255,255,255,.05)}
.reservation::after{content:&#x27;&#x27;;position:absolute;bottom:-30%;left:-10%;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,.05)}
.reservation-content{position:relative;z-index:1}
.reservation .emoji{font-size:48px;margin-bottom:24px}
.reservation h2{font-family:&#x27;Playfair Display&#x27;,serif;font-size:48px;font-weight:700;margin-bottom:16px}
.reservation p{font-size:18px;color:rgba(255,255,255,.85);margin-bottom:40px;max-width:500px;margin-left:auto;margin-right:auto}
.btn-reserve{display:inline-block;padding:18px 48px;background:#fff;color:#b45309;text-decoration:none;border-radius:4px;font-weight:700;font-size:16px;letter-spacing:1px;text-transform:uppercase;transition:all .3s;box-shadow:0 4px 24px rgba(0,0,0,.2)}
.btn-reserve:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.3)}

/* Contact / Location */
.contact{padding:100px 0;background:#fffbf5}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start}
.contact-info h2{font-family:&#x27;Playfair Display&#x27;,serif;font-size:40px;font-weight:700;color:#1c1917;margin-bottom:32px}
.contact-item{display:flex;gap:16px;margin-bottom:28px}
.contact-icon{width:48px;height:48px;background:#b4530915;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.contact-item h4{font-size:14px;letter-spacing:1px;text-transform:uppercase;color:#b45309;font-weight:600;margin-bottom:4px}
.contact-item p{color:#57534e;font-size:16px}
.contact-map{background:linear-gradient(135deg,#e7e5e4,#d6d3d1);border-radius:12px;min-height:360px;display:flex;align-items:center;justify-content:center;font-size:120px;position:relative;overflow:hidden}
.contact-map::after{content:&#x27;📍&#x27;;font-size:64px;position:absolute}

/* Footer */
.footer{padding:48px 0;background:#1c1917;color:rgba(255,255,255,.5);text-align:center;font-size:14px}
.footer .logo{font-family:&#x27;Playfair Display&#x27;,serif;font-size:20px;color:#fff;margin-bottom:12px}
.footer-links{display:flex;gap:24px;justify-content:center;margin-top:16px}
.footer-links a{color:rgba(255,255,255,.5);text-decoration:none;font-size:13px;transition:color .3s}
.footer-links a:hover{color:#fff}

}

ppercase;color:rgba(255,255,255,.8);margin-bottom:32px}\n.hero h1{font-family:'Playfair Display',serif;font-size:72px;font-weight:700;line-height:1.1;margin-bottom:24px;text-shadow:0 2px 40px rgba(0,0,0,.3)}\n.hero .tagline{font-family:'Playfair Display',serif;font-size:24px;font-style:italic;color:rgba(255,255,255,.8);margin-bottom:40px}\n.hero-scroll{margin-top:60px;animation:bounce 2s infinite}\n.hero-scroll span{display:block;width:24px;height:24px;border-right:2px solid rgba(255,255,255,.5);border-bottom:2px solid rgba(255,255,255,.5);transform:rotate(45deg);margin:0 auto}\n@keyframes bounce{0%,20%,50%,80%,100%{transform:translateY(0)}40%{transform:translateY(-10px)}60%{transform:translateY(-5px)}}\n\n/* Menu Highlights */\n.menu{padding:100px 0;background:#fffbf5}\n.menu-header{text-align:center;margin-bottom:64px}\n.menu-header .label{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:#b45309;font-weight:600;margin-bottom:12px}\n.menu-header h2{font-family:'Playfair Display',serif;font-size:48px;font-weight:700;color:#1c1917}\n.menu-header .divider{width:60px;height:2px;background:#b45309;margin:24px auto}\n.menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:40px}\n.menu-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(28,25,23,.06);transition:all .3s;border:1px solid #f5f0e8}\n.menu-card:hover{transform:translateY(-6px);box-shadow:0 16px 48px rgba(28,25,23,.12)}\n.menu-card-img{height:220px;background:linear-gradient(135deg,#fef3c7,#fde68a);display:flex;align-items:center;justify-content:center;font-size:80px;position:relative;overflow:hidden}\n.menu-card-img::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(28,25,23,.05),transparent)}\n.menu-card-body{padding:32px}\n.menu-card-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}\n.menu-card-top h3{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:#1c1917}\n.
