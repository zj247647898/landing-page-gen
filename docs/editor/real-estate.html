.listings{padding:96px 0;background:#f8fafc}
.section-header{text-align:center;margin-bottom:56px}
.section-header .overline{display:inline-block;font-size:13px;font-weight:600;color:#1e40af;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
.section-header h2{font-size:40px;font-weight:800;letter-spacing:-0.5px;color:#0f172a}
.listings-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px}
.listing-card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.06);transition:all .4s;border:1px solid #f1f5f9}
.listing-card:hover{transform:translateY(-8px);box-shadow:0 20px 60px rgba(0,0,0,.12)}
.listing-image{height:220px;background:linear-gradient(135deg,#1e40af30,#0891b230);display:flex;align-items:center;justify-content:center;font-size:72px;position:relative}
.listing-badge{position:absolute;top:16px;left:16px;padding:6px 14px;background:#1e40af;color:#fff;border-radius:8px;font-size:12px;font-weight:700}
.listing-body{padding:28px}
.listing-price{font-size:28px;font-weight:800;color:#1e40af;margin-bottom:8px}
.listing-title{font-size:18px;font-weight:700;color:#0f172a;margin-bottom:16px}
.listing-details{display:flex;gap:20px;color:#64748b;font-size:14px;font-weight:500}
.listing-details span{display:flex;align-items:center;gap:6px}

/* Stats */
.stats{padding:72px 0;background:linear-gradient(135deg,#1e40af,#1e40afdd,#0f172a);color:#fff}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:32px;text-align:center}
.stat-item .number{font-size:44px;font-weight:900;margin-bottom:4px}
.stat-item .label{font-size:14px;color:rgba(255,255,255,.7);font-weight:500}

/* Agent */
.agent{padding:96px 0}
.agent-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center}
.agent-avatar{width:280px;height:280px;background:linear-gradient(135deg,#1e40af,#0891b2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:120px;margin:0 auto;box-shadow:0 20px 60px #1e40af30}
.agent-info .overline{display:inline-block;font-size:13px;font-weight:600;color:#1e40af;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
.agent-info h2{font-size:36px;font-weight:800;color:#0f172a;margin-bottom:8px}
.agent-info .title{font-size:16px;color:#0891b2;font-weight:600;margin-bottom:20px}
.agent-info p{color:#64748b;line-height:1.8;margin-bottom:28px}
.agent-contact{display:flex;gap:16px;flex-wrap:wrap}
.agent-contact a{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:12px;font-weight:600;font-size:15px;transition:all .3s}
.agent-contact .btn-primary{background:#1e40af;color:#fff}
.agent-contact .btn-primary:hover{background:#1e40afcc;transform:translateY(-2px);box-shadow:0 10px 30px #1e40af40}
.agent-contact .btn-outline{border:2px solid #1e40af;color:#1e40af}
.agent-contact .btn-outline:hover{background:#1e40af10;transform:translateY(-2px)}

/* CTA */
.cta{padding:96px 0;background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;text-align:center;position:relative;overflow:hidden}
.cta::before{content:&#x27;&#x27;;position:absolute;bottom:-40%;left:-10%;width:400px;height:400px;background:radial-gradient(circle,#1e40af25,transparent 70%);border-radius:50%}
.cta::after{content:&#x27;&#x27;;position:absolute;top:-30%;right:-5%;width:300px;height:300px;background:radial-gradient(circle,#0891b220,transparent 70%);border-radius:50%}
.cta-content{position:relative;z-index:1}
.cta h2{font-size:44px;font-weight:900;margin-bottom:16px;letter-spacing:-0.5px}
.cta p{font-size:18px;color:rgba(255,255,255,.7);margin-bottom:36px;max-width:520px;margin-left:auto;margin-right:auto}
.cta .btn-primary{display:inline-block;padding:18px 44px;background:#1e40af;color:#fff;border-radius:12px;font-weight:700;font-size:16px;transition:all .3s}
.cta .btn-primary:hover{background:#0891b2;transform:translateY(-2px);box-shadow:0 12px 40px #1e40af50}
.cta-note{font-size:13px;color:rgba(255,255,255,.45);margin-top:16px}

/* Footer */
.footer{padding:40px 0;text-align:center;background:#0f172a;color:rgba(255,255,255,.5);font-size:14px}
.footer-links{display:flex;justify-content:center;gap:24px;margin-bottom:16px}
.footer-links a{color:rgba(255,255,255,.6);transition:color .3s;font-size:13px}
.footer-links a:hover{color:#fff}

@media(max-width:768px){
.hero{padding:120px 0 64px}
.hero h1{font-size:32px;letter-spacing:-0.5px}
.hero-search{flex-direction:column}
.hero-stats{gap:24px;flex-wrap:wrap}
.hero-stat .number{font-size:24px}
.listings-grid{grid-template-columns:1fr}
.stats-grid{grid-template-columns:repeat(2,1fr)}
.agent-grid{grid-template-columns:1fr;text-align:center}
.agent-avatar{width:180px;height:180px;font-size:80px}
.agent-contact{justify-content:center}
.cta h2{font-size:28px}
.nav-links{display:none}
}

ight:1.6;color:#1f2937}\n.container{max-width:1200px;margin:0 auto;padding:0 24px}\na{text-decoration:none;color:inherit}\n\n/* Navigation */\n.nav{padding:16px 0;position:absolute;top:0;left:0;right:0;z-index:10}\n.nav .container{display:flex;justify-content:space-between;align-items:center}\n.nav-logo{font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.5px}\n.nav-logo span{color:#0891b2}\n.nav-links{display:flex;gap:32px;align-items:center}\n.nav-links a{color:rgba(255,255,255,.85);font-size:14px;font-weight:500;transition:color .3s}\n.nav-links a:hover{color:#fff}\n.nav-cta{padding:10px 24px;background:#1e40af;color:#fff;border-radius:8px;font-weight:600;font-size:14px;transition:all .3s}\n.nav-cta:hover{background:#0891b2;transform:translateY(-1px)}\n\n/* Hero */\n.hero{padding:160px 0 100px;background:linear-gradient(135deg,#0f172a 0%,#1e293b 60%,#1e40af40 100%);color:#fff;position:relative;overflow:hidden}\n.hero::before{content:'';position:absolute;top:-50%;right:-20%;width:600px;height:600px;background:radial-gradient(circle,#0891b220,transparent 70%);border-radius:50%}\n.hero-content{max-width:700px;position:relative;z-index:1}\n.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:rgba(255,255,255,.1);border-radius:100px;font-size:13px;font-weight:500;margin-bottom:24px;backdrop-filter:blur(10px)}\n.hero h1{font-size:56px;font-weight:900;line-height:1.08;margin-bottom:20px;letter-spacing:-1.5px}\n.hero h1 span{background:linear-gradient(135deg,#0891b2,#1e40af);-webkit-background-clip:text;-webkit-text-fill-color:transparent}\n.hero p{font-size:18px;color:rgba(255,255,255,.75);margin-bottom:36px;max-width:560px;line-height:1.7}\n.hero-search{display:flex;gap:12px;max-width:560px;background:rgba(255,255,255,.1);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:12px}\n.hero-search input{flex:1;padding:14px 20px;border:none;background:rgba(255,255,255,.08);color:#fff;border-radius:10px;font-family:'Inter',sans-serif;font-size:15px;outline:none}\n.hero-search input::placeholder{color:rgba(255,255,255,.45)}\n.hero-search button{padding:14px 28px;background:#1e40af;color:#fff;border:none;border-radius:10px;font-family:'Inter',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:all .3s;white-space:nowrap}\n.hero-search button:hover{background:#0891b2;transform:translateY(-1px)}\n.hero-stats{display:flex;gap:48px;margin-top:48px}\n.hero-stat{text-align:left}\n.hero-stat .number{font-size:32px;font-weight:800;color:#fff}\n.hero-stat .label{font-size:13px;color:rgba(255,255,255,.6);font-weight:500}\n\n/* Listings */\n.listings{padding:96px 0;background:#f8fafc}\n.section-header{text-align:center;margin-bottom:56px}\n.section-header .overline{display:inline-block;font-size:13px;font-weight:600;color:#1e40af;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}\n.section-header h2{font-size:40px;font-weight:800;letter-spacing:-0.5px;color:#0f172a}\n.listings-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px}\n.listing-card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.06);transition:all .4s;border:1px solid #f1f5f9}\n.listing-card:hover{transform:translateY(-8px);box-shadow:0 20px 60px rgba(0,0,0,.12)}\n.listing-image{height:220px;background:linear-gradient(135deg,#1e40af30,#0891b230);display:flex;align-items:center;justify-content:center;font-size:72px;position:relative}\n.listing-badge{position:absolute;top:16px;left:16px;padding:6px 14px;background:#1e40af;color:#fff;border-radius:8px;font-size:12px;font-weight:700}\n.listing-body{padding:28px}\n.listing-price{font-size:28px;font-weight:800;color:#1e40af;margin-bottom:8px}\n.listing-title{font-size:18px;font-weight:700;color:#0f172a;margin-bottom:16px}\n.listing-details{display:flex;gap:20px;color:#64748b;font-size:14px;font-weight:500}\n.listing-details span{display:flex;align-items:center;gap:6px}\n\n/* Stats */\n.s
