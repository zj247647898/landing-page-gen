&lt;body&gt;
&lt;nav&gt;
&lt;div class=&quot;container&quot;&gt;
&lt;a href=&quot;#&quot; class=&quot;nav-brand&quot;&gt;Bright Futures Foundation&lt;/a&gt;
&lt;div class=&quot;nav-links&quot;&gt;
&lt;a href=&quot;#mission&quot;&gt;Our Mission&lt;/a&gt;
&lt;a href=&quot;#impact&quot;&gt;Our Impact&lt;/a&gt;
&lt;a href=&quot;#story&quot;&gt;Stories&lt;/a&gt;
&lt;a href=&quot;#donate&quot; class=&quot;nav-donate&quot;&gt;Donate Now&lt;/a&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/nav&gt;

&lt;section class=&quot;hero&quot;&gt;
&lt;div class=&quot;container hero-content&quot;&gt;
&lt;div class=&quot;tagline&quot;&gt;Every Child Deserves a Chance to Shine&lt;/div&gt;
&lt;h1&gt;Together, We Create Lasting Change&lt;/h1&gt;
&lt;p class=&quot;description&quot;&gt;We provide education, healthcare, and hope to underserved children around the world. Together, we can break the cycle of poverty and build a brighter future.&lt;/p&gt;
&lt;div class=&quot;hero-buttons&quot;&gt;
&lt;a href=&quot;#donate&quot; class=&quot;btn-primary&quot;&gt;Donate Now&lt;/a&gt;
&lt;a href=&quot;#mission&quot; class=&quot;btn-outline&quot;&gt;Learn Our Mission&lt;/a&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;

&lt;section class=&quot;mission&quot; id=&quot;mission&quot;&gt;
&lt;div class=&quot;container&quot;&gt;
&lt;div class=&quot;mission-grid&quot;&gt;
&lt;div&gt;
&lt;div class=&quot;mission-label&quot;&gt;Our Mission&lt;/div&gt;
&lt;h2&gt;Driven by Compassion, Guided by Purpose&lt;/h2&gt;
&lt;p&gt;Our mission is to empower children in underserved communities through access to quality education, healthcare, and mentorship — creating lasting change one life at a time.&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;mission-visual&quot;&gt;
&lt;div class=&quot;mission-visual-inner&quot;&gt;
&lt;div class=&quot;icon&quot;&gt;&amp;#10084;&amp;#65039;&lt;/div&gt;
&lt;div class=&quot;quote&quot;&gt;&quot;The best way to find yourself is to lose yourself in the service of others.&quot;&lt;/div&gt;
&lt;div class=&quot;attribution&quot;&gt;— Mahatma Gandhi&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;

&lt;section class=&quot;impact&quot; id=&quot;impact&quot;&gt;
&lt;div class=&quot;container&quot;&gt;
&lt;h2&gt;Our Impact in Numbers&lt;/h2&gt;
&lt;p class=&quot;subtitle&quot;&gt;Every number represents a life touched, a community uplifted, a future transformed.&lt;/p&gt;
&lt;div class=&quot;impact-grid&quot;&gt;
&lt;div class=&quot;impact-card&quot;&gt;
&lt;div class=&quot;impact-stat&quot;&gt;50,000+&lt;/div&gt;
&lt;div class=&quot;impact-label&quot;&gt;Children Helped&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;impact-card&quot;&gt;
&lt;div class=&quot;impact-stat&quot;&gt;120&lt;/div&gt;
&lt;div class=&quot;impact-label&quot;&gt;Communities Served&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;impact-card&quot;&gt;
&lt;div class=&quot;impact-stat&quot;&gt;98%&lt;/div&gt;
&lt;div class=&quot;impact-label&quot;&gt;Funds Go Directly to Programs&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;

&lt;section class=&quot;story&quot; id=&quot;story&quot;&gt;
&lt;div class=&quot;container&quot;&gt;
&lt;div class=&quot;story-grid&quot;&gt;
&lt;div class=&quot;story-image&quot;&gt;
&lt;div class=&quot;story-image-inner&quot;&gt;
&lt;div class=&quot;emoji&quot;&gt;&amp;#127775;&lt;/div&gt;
&lt;div class=&quot;caption&quot;&gt;A story of hope and transformation&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div&gt;
&lt;div class=&quot;story-label&quot;&gt;A Story of Hope&lt;/div&gt;
&lt;h2&gt;Amara&#x27;s Journey: From Dreams to Reality&lt;/h2&gt;
&lt;p class=&quot;story-content&quot;&gt;When Amara first joined our program at age 7, she could barely read. Today, she&#x27;s a proud university student studying to become a doctor — giving back to the very community that raised her. &quot;Bright Futures didn&#x27;t just change my life, they gave me a life worth living,&quot; she says.&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;

&lt;section class=&quot;donate&quot; id=&quot;donate&quot;&gt;
&lt;div class=&quot;container&quot;&gt;
&lt;div class=&quot;donate-label&quot;&gt;Make a Difference&lt;/div&gt;
&lt;h2&gt;Your Generosity Changes Lives&lt;/h2&gt;
&lt;p class=&quot;subtitle&quot;&gt;Choose an amount below and make an immediate impact today. Every dollar goes directly to helping those who need it most.&lt;/p&gt;
&lt;div class=&quot;donation-options&quot;&gt;
&lt;div class=&quot;donation-card&quot;&gt;
&lt;span class=&quot;badge&quot;&gt;Popular&lt;/span&gt;
&lt;div class=&quot;donation-amount&quot;&gt;$25&lt;/div&gt;
&lt;div class=&quot;donation-desc&quot;&gt;Provides school supplies for 5 children for an entire year&lt;/div&gt;
&lt;button class=&quot;donate-btn&quot; onclick=&quot;window.location.href=&#x27;#donate&#x27;&quot;&gt;Donate $25&lt;/button&gt;
&lt;/div&gt;
&lt;div class=&quot;donation-card featured&quot;&gt;
&lt;span class=&quot;badge&quot;&gt;Most Impactful&lt;/span&gt;
&lt;div class=&quot;donation-amount&quot;&gt;$50&lt;/div&gt;
&lt;div class=&quot;donation-desc&quot;&gt;Funds healthcare access for a family for 6 months&lt;/div&gt;
&lt;button class=&quot;donate-btn&quot; onclick=&quot;window.location.href=&#x27;#donate&#x27;&quot;&gt;Donate $50&lt;/button&gt;
&lt;/div&gt;
&lt;div class=&quot;donation-card&quot;&gt;
&lt;span class=&quot;badge&quot;&gt;Champion&lt;/span&gt;
&lt;div class=&quot;donation-amount&quot;&gt;$100&lt;/div&gt;
&lt;div class=&quot;donation-desc&quot;&gt;Sponsors a child&#x27;s complete education for one year&lt;/div&gt;
&lt;button class=&quot;donate-btn&quot; onclick=&quot;window.location.href=&#x27;#donate&#x27;&quot;&gt;Donate $100&lt;/button&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/section&gt;

&lt;section class=&quot;cta&quot;&gt;
&lt;div class=&quot;container&quot;&gt;
&lt;h2&gt;Be the Change You Wish to See&lt;/h2&gt;
&lt;p&gt;Your support has the power to transform lives. Join thousands of others who have chosen to make a difference.&lt;/p&gt;
&lt;a href=&quot;#donate&quot; class=&quot;btn-primary&quot;&gt;Donate Now&lt;/a&gt;
&lt;p class=&quot;small&quot;&gt;Tax-deductible. 100% secure. Every cent counts.&lt;/p&gt;
&lt;/div&gt;
&lt;/section&gt;

&lt;div class=&quot;container&quot;&gt;

ry{padding:100px 0;background:#fefce8}\n.story-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center}\n.story-image{min-height:400px;background:linear-gradient(135deg,#05966920,#7c3aed20);border-radius:24px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}\n.story-image-inner{text-align:center;padding:40px}\n.story-image-inner .emoji{font-size:80px;margin-bottom:16px}\n.story-image-inner .caption{font-family:'Lora',serif;font-style:italic;color:#4b5563;font-size:16px}\n.story-label{display:inline-block;padding:6px 16px;background:#7c3aed12;color:#7c3aed;border-radius:100px;font-size:13px;font-weight:600;margin-bottom:20px;letter-spacing:.5px;text-transform:uppercase}\n.story h2{font-size:36px;font-weight:700;line-height:1.25;margin-bottom:20px;color:#0f172a}\n.story-content{font-family:'Lora',serif;font-size:18px;color:#4b5563;line-height:1.8;font-style:italic}\n\n.donate{padding:100px 0;text-align:center;background:#fff}\n.donate-label{display:inline-block;padding:6px 16px;background:#05966912;color:#059669;border-radius:100px;font-size:13px;font-weight:600;margin-bottom:20px;letter-spacing:.5px;text-transform:uppercase}\n.donate h2{font-size:40px;font-weight:700;margin-bottom:16px;color:#0f172a}\n.donate .subtitle{font-size:18px;color:#6b7280;margin-bottom:48px;max-width:500px;margin-left:auto;margin-right:auto}\n.donation-options{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;margin-bottom:40px}\n.donation-card{width:220px;padding:40px 24px;border:2px solid #e5e7eb;border-radius:20px;transition:all .3s;cursor:pointer;background:#fff;position:relative}\n.donation-card:hover,.donation-card.featured{border-color:#059669;transform:translateY(-4px);box-shadow:0 20px 60px #05966915}\n.donation-card.featured{background:#05966908}\n.donation-card.featured .badge{display:block}\n.badge{display:none;position:absolute;top:-12px;left:50%;transform:translateX(-50%);padding:4px 16px;background:#059669;color:#fff;border-radius:100px;font-size:12px;font-weight:600}\n.donation-amount{font-size:36px;font-weight:800;color:#059669;margin-bottom:8px}\n.donation-desc{font-size:14px;color:#6b7280;line-height:1.5}\n.donate-btn{padding:14px 32px;background:#059669;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:all .3s;width:100%;margin-top:16px}\n.donate-btn:hover{box-shadow:0 8px 24px #05966940}\n\n.cta{padding:100px 0;background:linear-gradient(135deg,#059669,#7c3aed);color:#fff;text-align:center}\n.cta h2{font-size:40px;font-weight:700;margin-bottom:16px}\n.cta p{font-size:20px;color:rgba(255,255,255,.85);margin-bottom:36px;max-width:550px;margin-left:auto;margin-right:auto}\n.cta .btn-primary{background:#fff;color:#059669;padding:20px 48px;font-size:18px}\n.cta .btn-primary:hover{box-shadow:0 10px 40px rgba(0,0,0,.2)}\n.cta .small{font-size:14px;color:rgba(255,255,255,.7);margin-top:16px}\n\nfooter{padding:48px 0;text-align:center;background:#0f172a;color:rgba(255,255,255,.5)}\nfooter p{font-size:14px;line-height:1.8}\n\n@media(max-width:768px){\n.hero{padding:120px 0 60px}\n.hero h1{font-size:30px}\n.hero .tagline{font-size:18px}\n.hero .description{font-size:16px}\n.mission-grid,.story-grid{grid-template-columns:1fr;gap:40px}\n.mission h2,.story h2{font-size:28px}\n.impact-grid{grid-template-columns:1fr;gap:24px}\n.impact-stat{font-size:36px}\n.donation-options{flex-direction:column;align-items:center}\n.donation-card{width:100%;max-width:280px}\n.cta h2{font-size:28px}\n.nav-links{display:none}\n}\n\u003c/style\u003e\n\u003c/head\u003e\n\u003cbody\u003e\n\u003cnav\u003e\n\u003cdiv class=\"container\"\u003e\n\u003ca href=\"#\" class=\"nav-brand\"\u003eBright Futures Foundation\u003c/a\u003e\n\u003cdiv class=\"nav-links\"\u003e\n\u003ca href=\"#mission\"\u003eOur Mission\u003c/a\u003e\n\u003ca href=\"#impact\"\u003eOur Impact\u003c/a\u003e\n\u003ca href=\"#story\"\u003eStories\u003c/a\u003e\n\u003ca href=\"#donate\" class=\"nav-donate\"\u003eDonate Now\u003c/a\u003e\n\u003c/div\u003e\n\u003c/div\u003e\n\u003c/nav\u003e\n\n\u003csection class=\"hero\"\u003e\n\u003cdiv class=\"container hero-content\"\u003e\n\u003cdiv class=\"tagline\"\u003eEvery Child Deserves a Chance to Shine\u003c/div\u003e\n\u003ch1\u003eTogether, We Create Lasting Change\u003c/h1\u003e\n\u003cp class=\"description\"\u003eWe provide education, healthcare, and hope to underserved children around the world. Together, we can break the cycle of poverty and build a brighter future.\u003c/p\u003e\n\u003cdiv class=\"hero-buttons\"\u003e\n\u003ca href=\"#donate\" class=\"btn-primary\"\u003eDonate Now\u003c/a\u003e\n\u003ca href=\"#mission\" class=\"btn-outline\"\u003eLearn Our Mission\u003c/a\u003e\n\u003c/div\u003e\n\u003c/div\u003e\n\u003c/section\u003e\n\n\u003csection class=\"mission\" id=\"mission\"\u003e\n\u003cdiv class=\"container\"\u003e\n\u003cdiv class=\"mission-grid\"\u003e\n\u003cdiv\u003e\n\u003cdiv class=\"mission-label\"\u003eOur Mission\u003c/div\u003e\n\u003ch2\u003eDriven by Compassion, Guided by Purpose\u003c/h2\u003e\n\u003cp\u003eOur mission is to empower children in underserved communities through access to quality education, healthcare, and mentorship — creating lasting change one life at a time.\u003c/p\u003e\n\u003c/div\u003e\n\u003cdiv class=\"mission-visual\"\u003e\n\u003cdiv class=\"mission-visual-inner\"\u003e\n\u003cdiv class=\"icon\"\u003e\u0026#10084;\u0026#65039;\u003c/div\u003e\n\u003cdiv class=\"quote\"\u003e\"The best way to find yourself is to lose yourself in the service of others.\"\u003c/div\u003e\n\u003cdiv class=\"attribution\"\u003e— Mahatma Gandhi\u003c/div\u003e\n\u003c/div\u003e\n\u003c/div\u003e\n\u003c/div\u003e\n\u003c/div\u003e\n\u003c/section\u003e\n\n\u003csection class=\"impact\" id=\"impact\"\u003e\n\u003cdiv class=\"container\"\u003e\n\u003ch2\u003eOur Impact in Numbers\u003c/h2\u003e\n\u003cp class=\"subtitle\"\u003eEvery number represents a life touched, a community uplifted, a future transformed.\u003c/p\u003e\n\u003cdiv class=\"impact-grid\"\u003e\n\u003cdiv class=\"impact-card\"\u003e\n\u003cdiv class=\"impact-stat\"\u003e50,000+\u003c/div\u003e\n\u003cdiv class=\"impact-label\"\u003eChildren Helped\u003c/div\u003e\n\u003c/div\u003e\n\u003cdiv class=\"impact-card\"\u003e\n\u003cdiv class=\"impact-stat\"\u003e120\u003c/div\u003e\n\u003cdiv class=\"impact-label\"\u003eCommunities Served\u003c/div\u003e\n\u003c/div\u003e\n\u003cdiv class=\"impact-card\"\u003e\n\u003cdiv class=\"impact-stat\"\u003e98%\u003c/div\u003e\n\u003cdiv class=\"impact-label\"\u003eFunds Go Directly to Programs\u003c/div\u003e\n\u003c/div\u003e\n\u003c/div\u003e\n\u003c/div\u003e\n\u003c/section\u003e\n\n\u003csection class=\"story\" id=\"story\"\u003e\n\u003cdiv class=\"container\"\u003e\n\u003cdiv class=\"story-grid\"\u003e\n\u003cdiv class=\"story-image\"\u003e\n\u003cdiv class=\"story-image-inner\"\u003e\n\u003cdiv class=\"emoji\"\u003e\u0026#127775;\u003c/div\u003e\n\u003cdiv class=\"caption\"\u003eA story of hope and transformation\u003c/div\u003e\n\u003c/div\u003e\n\u003c/div\u003e\n\u003cdiv\u003e\n\u003cdiv class=\"story-label\"\u003eA Story of Hope\u003c/div\u003e\n\u003ch2\u003eAmara's Journey: From Dreams to Reality\u003c/h2\u003e\n\u003cp class=\"story-content\"\u003eWhen Amara first joined our program at age 7, she could barely read. Today, she's a proud university student studying to become a doctor — giving back to the very community that raised her. \"Bright Futures didn't just change my life, they gave me a life worth living,\" she says.\u003c/p\u003e\n\u003c/div\u003e\n\u003c/div\u003e\n\u003c/div\u003e\n\u003c/section\u003e\n\n\u003csection class=\"donate\" id=\"donate\"\u003e\n\u003cdiv class=\"container\"\u003e\n\u003cdiv class=\"donate-label\"\u003eMake a Difference\u003c/div\u003e\n\u003ch2\u003eYour Generosity Changes Lives\u003c/h2\u003e\n\u003cp class=\"subtitle\"\u003eChoose an amount below and make an immediate impact tod
