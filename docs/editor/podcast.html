&lt;style&gt;
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:&#x27;Inter&#x27;,sans-serif;line-height:1.6;color:#e2e8f0;background:#0f172a}
a{text-decoration:none;color:inherit}
.container{max-width:1200px;margin:0 auto;padding:0 24px}

/* Nav */
.nav{padding:20px 0;position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(15,23,42,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(124,58,237,0.15)}
.nav .container{display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-size:22px;font-weight:800;background:linear-gradient(135deg,#7c3aed,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;gap:32px;align-items:center}
.nav-links a{color:#94a3b8;font-size:14px;font-weight:500;transition:color .3s}
.nav-links a:hover{color:#fff}
.btn-subscribe{padding:10px 24px;background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;border-radius:100px;font-weight:600;font-size:14px;transition:all .3s}
.btn-subscribe:hover{transform:translateY(-2px);box-shadow:0 8px 30px #7c3aed50}

/* Hero */
.hero{padding:160px 0 100px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:&#x27;&#x27;;position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:800px;background:radial-gradient(circle,#7c3aed20 0%,transparent 70%);pointer-events:none}
.hero::after{content:&#x27;&#x27;;position:absolute;top:-100px;right:-200px;width:500px;height:500px;background:radial-gradient(circle,#ec489915 0%,transparent 70%);pointer-events:none}
.hero-content{position:relative;z-index:1}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 20px;background:#7c3aed15;border:1px solid #7c3aed30;color:#7c3aed;border-radius:100px;font-size:13px;font-weight:600;margin-bottom:28px}
.play-icon{width:16px;height:16px;border-left:10px solid #7c3aed;border-top:6px solid transparent;border-bottom:6px solid transparent}
.hero h1{font-size:64px;font-weight:900;line-height:1.05;margin-bottom:20px;background:linear-gradient(135deg,#fff 0%,#7c3aed 50%,#ec4899 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero .tagline{font-size:22px;color:#94a3b8;max-width:600px;margin:0 auto 40px}
.hero-play{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#ec4899);display:flex;align-items:center;justify-content:center;margin:0 auto 32px;cursor:pointer;transition:all .4s;box-shadow:0 0 60px #7c3aed40;position:relative}
.hero-play::before{content:&#x27;&#x27;;position:absolute;inset:-8px;border-radius:50%;border:2px solid #7c3aed30;animation:pulse-ring 2s ease-out infinite}
.hero-play::after{content:&#x27;&#x27;;position:absolute;inset:-20px;border-radius:50%;border:1px solid #7c3aed15;animation:pulse-ring 2s ease-out infinite .5s}
.hero-play:hover{transform:scale(1.1);box-shadow:0 0 80px #7c3aed60}
.hero-play .tri{width:0;height:0;border-left:28px solid #fff;border-top:16px solid transparent;border-bottom:16px solid transparent;margin-left:6px}
@keyframes pulse-ring{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.3)}}

/* Episodes */
.episodes{padding:100px 0}
.section-label{display:inline-block;padding:6px 16px;background:#7c3aed15;color:#7c3aed;border-radius:100px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px}
.section-title{font-size:40px;font-weight:800;margin-bottom:48px;color:#fff}
.episode-card{background:linear-gradient(135deg,#1e293b,#0f172a);border:1px solid rgba(124,58,237,0.15);border-radius:20px;padding:32px;margin-bottom:20px;transition:all .3s;position:relative;overflow:hidden}
.episode-card::before{content:&#x27;&#x27;;position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,#7c3aed,#ec4899);border-radius:4px}
.episode-card:hover{border-color:#7c3aed40;transform:translateX(4px)}
.episode-header{display:flex;align-items:center;gap:16px;margin-bottom:12px}
.episode-num{font-size:12px;font-weight:700;color:#7c3aed;background:#7c3aed15;padding:4px 12px;border-radius:100px;letter-spacing:1px}
.episode-date{font-size:13px;color:#64748b}
.episode-card h3{font-size:20px;font-weight:700;color:#fff;margin-bottom:8px}
.episode-card p{color:#94a3b8;font-size:15px;line-height:1.7}
.episode-play-btn{display:inline-flex;align-items:center;gap:8px;margin-top:16px;color:#7c3aed;font-weight:600;font-size:14px;transition:color .3s}
.episode-play-btn:hover{color:#ec4899}

/* Host */
.host{padding:100px 0;background:linear-gradient(180deg,transparent,#7c3aed08,transparent)}
.host-grid{display:grid;grid-template-columns:1fr 2fr;gap:48px;align-items:center}
.host-avatar{width:200px;height:200px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#ec4899);display:flex;align-items:center;justify-content:center;font-size:72px;color:#fff;margin:0 auto;box-shadow:0 0 60px #7c3aed30}
.host-info h2{font-size:36px;font-weight:800;color:#fff;margin-bottom:8px}
.host-info .role{color:#7c3aed;font-weight:600;margin-bottom:16px}
.host-info p{color:#94a3b8;font-size:16px;line-height:1.8}

/* Platforms */
.platforms{padding:100px 0;text-align:center}
.platform-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:700px;margin:0 auto}
.platform-card{background:#1e293b;border:1px solid rgba(124,58,237,0.12);border-radius:16px;padding:32px 24px;transition:all .3s;text-align:center}
.platform-card:hover{border-color:#7c3aed40;transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.3)}
.platform-icon{font-size:40px;margin-bottom:12px}
.platform-card h4{color:#fff;font-size:16px;font-weight:600;margin-bottom:8px}
.platform-card .link{color:#7c3aed;font-size:13px;font-weight:600}

/* Stats */
.stats{padding:80px 0}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px}
.stat-card{text-align:center;padding:40px 24px;background:linear-gradient(135deg,#1e293b,#0f172a);border:1px solid rgba(124,58,237,0.12);border-radius:20px}
.stat-number{font-size:48px;font-weight:900;background:linear-gradient(135deg,#7c3aed,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{color:#64748b;font-size:14px;font-weight:500;margin-top:4px}

/* CTA */
.cta{padding:100px 0;text-align:center;position:relative}
.cta::before{content:&#x27;&#x27;;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:400px;background:radial-gradient(circle,#7c3aed12 0%,transparent 70%);pointer-events:none}
.cta-content{position:relative;z-index:1}
.cta h2{font-size:48px;font-weight:900;color:#fff;margin-bottom:16px}
.cta p{color:#94a3b8;font-size:18px;margin-bottom:40px;max-width:500px;margin-left:auto;margin-right:auto}
.btn-cta{display:inline-flex;align-items:center;gap:10px;padding:20px 48px;background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;border-radius:100px;font-weight:700;font-size:18px;transition:all .3s;box-shadow:0 8px 40px #7c3aed30}
.btn-cta:hover{transform:translateY(-3px);box-shadow:0 12px 60px #7c3aed50}
.btn-cta .cta-play{width:20px;height:20px;border-left:12px solid #fff;border-top:7px solid transparent;border-bottom:7px solid transparent}

/* Footer */
.footer{padding:48px 0;border-top:1px solid rgba(124,58,237,0.1);text-align:center;color:#475569;font-size:14px}

/* Responsive */
@media(max-width:768px){
.hero h1{font-size:36px}
.hero .tagline{font-size:17px}
.hero-play{width:80px;height:80px}
.hero-play .tri{border-left-width:22px;border-top-width:12px;border-bottom-width:12px;margin-left:4px}
.section-title{font-size:28px}
.host-grid{grid-template-columns:1fr;text-align:center}
.host-avatar{width:150px;height:150px;font-size:56px}
.platform-grid{grid-template-columns:1fr}
.stats-grid{grid-template-columns:1fr}
.cta h2{font-size:32px}
.nav-links{display:none}
.episode-card{padding:24px}
